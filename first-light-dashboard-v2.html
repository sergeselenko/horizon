<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation First Light — Execution Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   CSS VARIABLES — Sales Page Design System
   ══════════════════════════════════════════════════════════ */
:root {
  --primary-blue: #1D4ED8;
  --accent-blue: #2563EB;
  --light-blue: #60A5FA;
  --dark-slate: #0F172A;
  --white: #FFFFFF;
  --light-gray: #F8FAFC;
  --cta-orange: #f97316;
  --cta-orange-hover: #ea580c;
  --text-muted: #475569;
  --text-muted-dark: #94a3b8;
  --text-faint: #64748b;
  --text-soft-dark: #cbd5e1;
  --border: #e2e8f0;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --radius: 16px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 6px 16px rgba(0,0,0,0.04);
  --shadow-elevated: 0 4px 12px rgba(0,0,0,0.08), 0 12px 32px rgba(0,0,0,0.06);
  --content-width: 680px;
  /* Status colors */
  --status-complete: #16a34a;
  --status-complete-bg: #dcfce7;
  --status-progress: #d97706;
  --status-progress-bg: #fef3c7;
  --status-pending: #6b7280;
  --status-pending-bg: #f3f4f6;
  --status-blocked: #dc2626;
  --status-blocked-bg: #fee2e2;
  --status-parallel: #2563EB;
  --status-parallel-bg: #dbeafe;
}

/* ══════════════════════════════════════════════════════════
   RESET & BASE
   ══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  font-size: 18px;
  line-height: 1.6;
  color: var(--dark-slate);
  background: var(--white);
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════════════════════════
   PIN GATE
   ══════════════════════════════════════════════════════════ */
#pin-gate {
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: var(--dark-slate);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
#pin-gate.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.pin-container {
  text-align: center;
  padding: 20px;
}
.pin-logo {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--light-blue);
  margin-bottom: 12px;
}
.pin-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 8px;
  line-height: 1.2;
}
.pin-subtitle {
  font-size: 16px;
  color: var(--text-muted-dark);
  margin-bottom: 32px;
}
.pin-boxes {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 16px;
}
.pin-box {
  width: 56px;
  height: 64px;
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 24px;
  font-weight: 700;
  color: var(--white);
  text-align: center;
  outline: none;
  transition: border-color 0.2s ease, background 0.2s ease;
  -webkit-appearance: none;
}
.pin-box:focus {
  border-color: var(--accent-blue);
  background: rgba(37,99,235,0.1);
}
.pin-box.error {
  border-color: #ef4444;
  background: rgba(239,68,68,0.1);
  animation: shake 0.5s ease;
}
.pin-error-msg {
  font-size: 14px;
  color: #ef4444;
  height: 20px;
  opacity: 0;
  transition: opacity 0.2s ease;
}
.pin-error-msg.visible { opacity: 1; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

@media (min-width: 768px) {
  .pin-title { font-size: 36px; }
  .pin-box { width: 64px; height: 72px; font-size: 28px; }
}

/* ══════════════════════════════════════════════════════════
   HEADER & NAVIGATION
   ══════════════════════════════════════════════════════════ */
#app-header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--dark-slate);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 0 20px;
}
.header-inner {
  max-width: 900px;
  margin: 0 auto;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 48px;
}
.header-brand {
  font-size: 15px;
  font-weight: 600;
  color: var(--white);
  white-space: nowrap;
}
.header-brand span { color: var(--light-blue); }
.tab-nav {
  display: flex;
  gap: 4px;
  padding: 8px 0 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  padding: 8px 14px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted-dark);
  background: transparent;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--white); background: rgba(255,255,255,0.06); }
.tab-btn.active { color: var(--white); background: var(--accent-blue); }

/* ══════════════════════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════════════════════ */
#app-content { display: none; }
#app-content.visible { display: block; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.section {
  width: 100%;
  padding: 48px 20px;
}
.section-white { background: var(--white); color: var(--dark-slate); }
.section-gray { background: var(--light-gray); color: var(--dark-slate); }
.section-dark { background: var(--dark-slate); color: var(--white); }
.container {
  max-width: var(--content-width);
  margin: 0 auto;
  width: 100%;
}
@media (min-width: 768px) {
  .section { padding: 64px 24px; }
}

/* ══════════════════════════════════════════════════════════
   TYPOGRAPHY
   ══════════════════════════════════════════════════════════ */
.h1 { font-size: 28px; font-weight: 700; line-height: 1.2; margin: 0 0 16px; }
.h2 { font-size: 24px; font-weight: 700; line-height: 1.2; margin: 0 0 20px; }
.h3 { font-size: 20px; font-weight: 600; line-height: 1.3; margin: 0 0 12px; }
.eyebrow {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.5px; margin: 0 0 8px;
}
.section-dark .eyebrow { color: var(--light-blue); }
.section-white .eyebrow, .section-gray .eyebrow { color: var(--accent-blue); }

@media (min-width: 768px) {
  .h1 { font-size: 36px; }
  .h2 { font-size: 28px; }
  .h3 { font-size: 22px; }
}

/* ══════════════════════════════════════════════════════════
   CARDS
   ══════════════════════════════════════════════════════════ */
.card {
  background: var(--light-gray);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin-bottom: 16px;
}
.section-gray .card { background: var(--white); }
.section-dark .card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: none;
}
.section-dark .card h3, .section-dark .card .card-title { color: var(--white); }
.section-dark .card p, .section-dark .card .card-body { color: var(--text-soft-dark); }
@media (min-width: 768px) { .card { padding: 24px; } }

.card-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}
.card-body {
  font-size: 16px;
  line-height: 1.5;
  color: var(--text-muted);
}
.section-dark .card-body { color: var(--text-soft-dark); }

/* Card grid */
.card-grid {
  display: grid;
  gap: 12px;
}
.card-grid-2 { grid-template-columns: 1fr; }
.card-grid-3 { grid-template-columns: 1fr; }
.card-grid-4 { grid-template-columns: 1fr 1fr; }
@media (min-width: 768px) {
  .card-grid-2 { grid-template-columns: 1fr 1fr; }
  .card-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .card-grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
}

/* Stat card */
.stat-card { text-align: center; padding: 20px 16px; }
.stat-number {
  font-size: 28px;
  font-weight: 700;
  color: var(--primary-blue);
  margin-bottom: 4px;
}
.section-dark .stat-number { color: var(--light-blue); }
.stat-label {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 500;
}
.section-dark .stat-label { color: var(--text-muted-dark); }

/* ══════════════════════════════════════════════════════════
   STATUS BADGES
   ══════════════════════════════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 600;
  line-height: 1.4;
  white-space: nowrap;
}
.badge-complete { background: var(--status-complete-bg); color: var(--status-complete); }
.badge-progress { background: var(--status-progress-bg); color: var(--status-progress); }
.badge-pending { background: var(--status-pending-bg); color: var(--status-pending); }
.badge-blocked { background: var(--status-blocked-bg); color: var(--status-blocked); }
.badge-parallel { background: var(--status-parallel-bg); color: var(--status-parallel); }
.badge-next { background: #fef3c7; color: #92400e; }

/* ══════════════════════════════════════════════════════════
   PHASE SECTIONS (Tab 2)
   ══════════════════════════════════════════════════════════ */
.phase-section {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}
.phase-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s ease;
}
.phase-header:hover { background: var(--light-gray); }
.phase-chevron {
  flex-shrink: 0;
  font-size: 14px;
  color: var(--text-muted);
  transition: transform 0.25s ease;
  width: 20px;
  text-align: center;
}
.phase-section.expanded .phase-chevron { transform: rotate(90deg); }
.phase-name {
  flex: 1;
  font-size: 16px;
  font-weight: 600;
  color: var(--dark-slate);
  min-width: 0;
}
.phase-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.phase-progress-text {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
}
.phase-progress-bar {
  width: 60px;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.phase-progress-fill {
  height: 100%;
  background: var(--accent-blue);
  border-radius: 3px;
  transition: width 0.3s ease;
}
.phase-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.phase-section.expanded .phase-body {
  max-height: 5000px;
}
.phase-body-inner {
  padding: 0 20px 20px;
  border-top: 1px solid var(--border);
}

/* Subsection within a phase */
.subsection-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-muted);
  margin: 20px 0 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* ══════════════════════════════════════════════════════════
   CHECKBOX ITEMS
   ══════════════════════════════════════════════════════════ */
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.check-item:last-child { border-bottom: none; }
.check-item input[type="checkbox"] {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  margin-top: 2px;
  accent-color: var(--accent-blue);
  cursor: pointer;
}
.check-item-text {
  flex: 1;
  font-size: 16px;
  line-height: 1.5;
  color: var(--dark-slate);
  transition: color 0.2s ease;
}
.check-item.checked .check-item-text {
  color: var(--text-muted-dark);
  text-decoration: line-through;
}
.check-item-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}
.check-item-time {
  font-size: 13px;
  color: var(--text-faint);
  white-space: nowrap;
}
.check-item-who {
  font-size: 12px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}
.who-serge { background: #fef3c7; color: #92400e; }
.who-claude { background: #dbeafe; color: #1e40af; }
.who-both { background: #e9d5ff; color: #6b21a8; }

/* Detail expand */
.check-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.check-detail.expanded { max-height: 300px; }
.check-detail-inner {
  padding: 8px 0 4px 32px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-muted);
}

/* ══════════════════════════════════════════════════════════
   ACTION CARDS (What's Next)
   ══════════════════════════════════════════════════════════ */
.action-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--light-gray);
  border-radius: var(--radius);
  margin-bottom: 10px;
  border-left: 4px solid var(--accent-blue);
}
.action-card-num {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  background: var(--accent-blue);
  color: var(--white);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
}
.action-card-content { flex: 1; min-width: 0; }
.action-card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--dark-slate);
  margin-bottom: 2px;
}
.action-card-info {
  font-size: 13px;
  color: var(--text-muted);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* ══════════════════════════════════════════════════════════
   MILESTONE CARDS
   ══════════════════════════════════════════════════════════ */
.milestone-card {
  padding: 20px;
  border-radius: var(--radius);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 12px;
}
.milestone-card.target {
  border-color: var(--accent-blue);
  background: rgba(37,99,235,0.08);
}
.milestone-revenue {
  font-size: 22px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 6px;
}
.milestone-means {
  font-size: 16px;
  color: var(--text-soft-dark);
  margin-bottom: 8px;
}
.milestone-unlocks {
  font-size: 14px;
  color: var(--text-muted-dark);
}
.milestone-unlocks strong { color: var(--light-blue); }

/* ══════════════════════════════════════════════════════════
   TABLES
   ══════════════════════════════════════════════════════════ */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  line-height: 1.4;
}
.data-table th {
  background: var(--dark-slate);
  color: var(--white);
  font-weight: 600;
  padding: 10px 12px;
  text-align: left;
  font-size: 13px;
}
.data-table th:first-child { border-radius: var(--radius-sm) 0 0 0; }
.data-table th:last-child { border-radius: 0 var(--radius-sm) 0 0; }
.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.data-table tr:nth-child(even) td { background: var(--light-gray); }
.data-table tr:last-child td { border-bottom: none; }
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius-sm); }

/* ══════════════════════════════════════════════════════════
   WARNING CARDS (Kill Criteria)
   ══════════════════════════════════════════════════════════ */
.warning-card {
  background: var(--status-blocked-bg);
  border: 1px solid rgba(220,38,38,0.2);
  border-left: 4px solid var(--status-blocked);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  margin-bottom: 10px;
}
.warning-card-threshold {
  font-size: 16px;
  font-weight: 700;
  color: var(--status-blocked);
  margin-bottom: 4px;
}
.warning-card-action {
  font-size: 15px;
  color: var(--dark-slate);
}

/* ══════════════════════════════════════════════════════════
   COPY BUTTON
   ══════════════════════════════════════════════════════════ */
.copy-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.copy-row:last-child { border-bottom: none; }
.copy-label {
  flex-shrink: 0;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  min-width: 140px;
}
.copy-value {
  flex: 1;
  font-size: 14px;
  color: var(--dark-slate);
  font-family: 'SF Mono', 'Fira Code', monospace;
  word-break: break-all;
  min-width: 0;
}
.copy-btn {
  flex-shrink: 0;
  padding: 4px 12px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-blue);
  background: var(--light-gray);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}
.copy-btn:hover { background: var(--accent-blue); color: var(--white); border-color: var(--accent-blue); }
.copy-btn.copied { background: var(--status-complete); color: var(--white); border-color: var(--status-complete); }

/* ══════════════════════════════════════════════════════════
   COLLAPSIBLE
   ══════════════════════════════════════════════════════════ */
.collapsible-trigger {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 12px 0;
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 600;
  color: var(--dark-slate);
  text-align: left;
}
.section-dark .collapsible-trigger { color: var(--white); }
.collapsible-trigger:hover { color: var(--accent-blue); }
.section-dark .collapsible-trigger:hover { color: var(--light-blue); }
.collapsible-icon {
  transition: transform 0.2s ease;
  font-size: 12px;
}
.collapsible.expanded .collapsible-icon { transform: rotate(90deg); }
.collapsible-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.collapsible.expanded .collapsible-body { max-height: 10000px; }

/* ══════════════════════════════════════════════════════════
   OUTLINE CARDS (Phase 3 — lighter treatment)
   ══════════════════════════════════════════════════════════ */
.outline-card {
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
}
.outline-card-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.outline-card-body {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text-faint);
}
.outline-card-body ul {
  margin: 8px 0 0 0;
  padding-left: 20px;
}
.outline-card-body li {
  margin-bottom: 4px;
  font-size: 14px;
}
.outline-badge {
  display: inline-block;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-faint);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-left: 8px;
}

/* ══════════════════════════════════════════════════════════
   RESET BUTTON
   ══════════════════════════════════════════════════════════ */
.reset-section {
  text-align: center;
  padding: 32px 20px;
  border-top: 1px solid var(--border);
}
.reset-btn {
  padding: 10px 24px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  color: var(--status-blocked);
  background: transparent;
  border: 1px solid rgba(220,38,38,0.3);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
}
.reset-btn:hover { background: var(--status-blocked-bg); }

/* ══════════════════════════════════════════════════════════
   INFO TABLE (non-checkbox)
   ══════════════════════════════════════════════════════════ */
.info-row {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);

const PIN_HASH = '70fa656aa0391eb9ef7bbc9c7e6771ec09e7d5d7ab1fcbbde2480d21263ee79a';

async function sha256(str) {
  var buf = new TextEncoder().encode(str);
  var hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

function initPinGate() {
  if (localStorage.getItem('fl-authenticated') === 'true') {
    document.getElementById('pin-gate').classList.add('hidden');
    document.getElementById('app-content').classList.add('visible');
    return;
  }
  var boxes = document.querySelectorAll('.pin-box');
  boxes.forEach(function(box, i) {
    box.addEventListener('input', function() {
      if (box.value.length === 1 && i < 3) {
        boxes[i + 1].focus();
      }
      if (i === 3 && box.value.length === 1) {
        var pin = '';
        boxes.forEach(function(b) { pin += b.value; });
        verifyPin(pin, boxes);
      }
    });
    box.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && box.value === '' && i > 0) {
        boxes[i - 1].focus();
        boxes[i - 1].value = '';
      }
    });
    box.addEventListener('paste', function(e) {
      e.preventDefault();
      var paste = (e.clipboardData || window.clipboardData).getData('text').trim();
      if (paste.length === 4 && /^\d{4}$/.test(paste)) {
        boxes.forEach(function(b, j) { b.value = paste[j]; });
        verifyPin(paste, boxes);
      }
    });
  });
  setTimeout(function() { boxes[0].focus(); }, 300);
}

async function verifyPin(pin, boxes) {
  var hash = await sha256(pin);
  if (hash === PIN_HASH) {
    localStorage.setItem('fl-authenticated', 'true');
    document.getElementById('pin-gate').classList.add('hidden');
    document.getElementById('app-content').classList.add('visible');
  } else {
    document.getElementById('pin-error').classList.add('visible');
    boxes.forEach(function(b) { b.classList.add('error'); b.value = ''; });
    setTimeout(function() {
      boxes.forEach(function(b) { b.classList.remove('error'); });
      document.getElementById('pin-error').classList.remove('visible');

    }, 800);
  }

function badge(status) {
  var map = {
    'complete': '<span class="badge badge-complete">\u2705 Complete</span>',
    'in-progress': '<span class="badge badge-progress">\ud83d\udfe1 In Progress</span>',
    'pending': '<span class="badge badge-pending">\u23f3 Pending</span>',
    'blocked': '<span class="badge badge-blocked">\ud83d\udd34 Blocked</span>',
    'parallel': '<span class="badge badge-parallel">\ud83d\udfe2 Parallel</span>',
    'next': '<span class="badge badge-next">\ud83d\udfe1 Next</span>'
  };
  return map[status] || '';
}

function whoBadge(who) {
  if (!who) return '';
  var cls = 'who-serge';
  if (who === 'Claude') cls = 'who-claude';
  if (who === 'Both') cls = 'who-both';
  return '<span class="check-item-who ' + cls + '">' + who + '<\/span>';
}

function renderCheckItem(item) {
  var saved = localStorage.getItem('fl-' + item.id) === 'true';
  var checkedClass = saved ? ' checked' : '';
  var checkedAttr = saved ? ' checked' : '';
  var html = '<div class="check-item' + checkedClass + '" data-item-id="' + item.id + '">';
  html += '<input type="checkbox" id="cb-' + item.id + '"' + checkedAttr + '>';
  html += '<div class="check-item-text">' + item.text + '<\/div>';
  html += '<div class="check-item-meta">';
  if (item.time) html += '<span class="check-item-time">' + item.time + '<\/span>';
  if (item.status) html += badge(item.status);
  if (item.who) html += whoBadge(item.who);
  html += '<\/div>';
  html += '<\/div>';
  if (item.detail) {
    html += '<div class="check-detail" id="detail-' + item.id + '"><div class="check-detail-inner">' + item.detail + '<\/div><\/div>';
  }
  return html;
}

function getPhaseItems(phase) {
  var items = [];
  if (phase.items) items = items.concat(phase.items);
  if (phase.subsections) {
    phase.subsections.forEach(function(sub) {
      items = items.concat(sub.items);
    });
  }
  return items;
}

function calcProgress(phase) {
  var items = getPhaseItems(phase);
  var total = items.length;
  var checked = 0;
  items.forEach(function(item) {
    if (localStorage.getItem('fl-' + item.id) === 'true') checked++;
  });
  return { checked: checked, total: total, pct: total > 0 ? Math.round((checked / total) * 100) : 0 };
}

function renderPhase(phase) {
  var prog = calcProgress(phase);
  var expanded = phase.defaultExpanded ? ' expanded' : '';
  var html = '<div class="phase-section' + expanded + '" id="phase-' + phase.id + '">';
  html += '<div class="phase-header" onclick="togglePhase(\'' + phase.id + '\')">';
  html += '<span class="phase-chevron">\u25B6<\/span>';
  html += '<span class="phase-name">' + phase.name + '<\/span>';
  html += '<div class="phase-meta">';
  html += badge(phase.status);
  html += '<span class="phase-progress-text" id="prog-text-' + phase.id + '">' + prog.pct + '%<\/span>';
  html += '<div class="phase-progress-bar"><div class="phase-progress-fill" id="prog-bar-' + phase.id + '" style="width:' + prog.pct + '%"><\/div><\/div>';
  html += '<\/div>';
  html += '<\/div>';
  html += '<div class="phase-body"><div class="phase-body-inner">';

  if (phase.items) {
    phase.items.forEach(function(item) { html += renderCheckItem(item); });
  }
  if (phase.subsections) {
    phase.subsections.forEach(function(sub) {
      html += '<div class="subsection-title">' + sub.name + '<\/div>';
      sub.items.forEach(function(item) { html += renderCheckItem(item); });
    });
  }

  html += '<\/div><\/div><\/div>';
  return html;
}

/* ──────────────────────────────────────────────────────────
   INIT & ROUTING
   ────────────────────────────────────────────────────────── */

function initTabs() {
  var nav = document.getElementById('tab-nav');
  var panels = document.getElementById('tab-panels');
  var navHtml = '';
  var panelsHtml = '';

  TABS.forEach(function(tab) {
    navHtml += '<button class="tab-btn" data-tab="' + tab.id + '">' + tab.label + '<\/button>';
    panelsHtml += '<div class="tab-panel" id="panel-' + tab.id + '"><\/div>';
  });

  nav.innerHTML = navHtml;
  panels.innerHTML = panelsHtml;

  // Build tab content
  document.getElementById('panel-mission-control').innerHTML = buildMissionControl();
  document.getElementById('panel-phase-2-convert').innerHTML = buildPhase2();
  document.getElementById('panel-phase-3-scale').innerHTML = buildPhase3();
  document.getElementById('panel-campaign').innerHTML = buildCampaign();
  document.getElementById('panel-reference').innerHTML = buildReference();

  // Tab click handlers
  nav.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      switchTab(btn.getAttribute('data-tab'));
    });
  });

  // Hash routing
  window.addEventListener('hashchange', function() {
    var hash = window.location.hash.replace('#', '') || 'mission-control';
    switchTab(hash);
  });

  // Init with hash or default
  var initialTab = window.location.hash.replace('#', '') || 'mission-control';
  switchTab(initialTab);

  // Checkbox handlers
  initCheckboxes();
}

function switchTab(tabId) {
  var valid = TABS.some(function(t) { return t.id === tabId; });
  if (!valid) tabId = 'mission-control';

  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-tab') === tabId);
  });
  document.querySelectorAll('.tab-panel').forEach(function(panel) {
    panel.classList.toggle('active', panel.id === 'panel-' + tabId);
  });

  if (window.location.hash !== '#' + tabId) {
    history.pushState(null, '', '#' + tabId);
  }

  window.scrollTo(0, 0);
}

function initCheckboxes() {
  document.querySelectorAll('.check-item input[type="checkbox"]').forEach(function(cb) {
    cb.addEventListener('change', function() {
      var itemDiv = cb.closest('.check-item');
      var itemId = itemDiv.getAttribute('data-item-id');
      localStorage.setItem('fl-' + itemId, cb.checked);
      itemDiv.classList.toggle('checked', cb.checked);
      updateAllProgress();
    });
  });
}

function updateAllProgress() {
  PHASES.forEach(function(phase) {
    var prog = calcProgress(phase);
    var textEl = document.getElementById('prog-text-' + phase.id);
    var barEl = document.getElementById('prog-bar-' + phase.id);
    if (textEl) textEl.textContent = prog.pct + '%';
    if (barEl) barEl.style.width = prog.pct + '%';
  });
}

/* ──────────────────────────────────────────────────────────
   GLOBAL INTERACTION HANDLERS
   ────────────────────────────────────────────────────────── */

window.togglePhase = function(phaseId) {
  var el = document.getElementById('phase-' + phaseId);
  if (el) el.classList.toggle('expanded');
};

window.toggleCollapsible = function(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('expanded');
};

window.copyToClipboard = function(btn, text) {
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
};

// Reset
document.addEventListener('DOMContentLoaded', function() {
  initPinGate();
  initTabs();

  document.getElementById('reset-btn').addEventListener('click', function() {
    if (confirm('Reset all progress? This will uncheck every item across all phases.')) {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (key && key.indexOf('fl-') === 0 && key !== 'fl-authenticated') {
          keys.push(key);
        }
      }
      keys.forEach(function(k) { localStorage.removeItem(k); });
      document.querySelectorAll('.check-item input[type="checkbox"]').forEach(function(cb) {
        cb.checked = false;
        cb.closest('.check-item').classList.remove('checked');
      });
      updateAllProgress();
    }
  });
});

})();
</script>
